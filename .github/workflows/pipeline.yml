name: GitHub Ecosystem Analytics Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Java (Spark)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python run_pipeline.py

      - name: Commit dashboards
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add dashboard_output/*.html || true

          git commit -m "Auto-update analytics dashboards" || echo "No changes"

          git push